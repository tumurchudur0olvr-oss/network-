version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: network_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: network_db
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    networks:
      - network_network

  redis:
    image: redis:7-alpine
    container_name: network_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - network_network

  api:
    build:
      context: ./backend/api
    container_name: network_api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
    depends_on:
      - db
      - redis
    networks:
      - network_network
    restart: unless-stopped

  scraper:
    build:
      context: ./backend/scraper
    container_name: network_scraper
    ports:
      - "5001:5001"
    depends_on:
      - db
      - redis
    networks:
      - network_network
    restart: unless-stopped

  monitoring:
    build:
      context: ./backend/monitoring
    container_name: network_monitoring
    ports:
      - "5002:5002"
    depends_on:
      - db
      - redis
    networks:
      - network_network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  network_network:
    driver: bridge
