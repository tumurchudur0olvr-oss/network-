version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:13-alpine
    container_name: network_db
    environment:
      POSTGRES_DB: network_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres123
    ports:
      - "5432:5432"
    volumes:
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: network_cache
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js API Gateway
  api:
    build:
      context: ./backend/api
      dockerfile: Dockerfile
    container_name: network_api
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: network_db
      DB_USER: postgres
      DB_PASSWORD: postgres123
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend/api:/app
      - /app/node_modules
    command: npm start

  # Python Web Scraper
  scraper:
    build:
      context: ./backend/scraper
      dockerfile: Dockerfile
    container_name: network_scraper
    ports:
      - "5001:5001"
    environment:
      FLASK_ENV: development
      PORT: 5001
      API_URL: http://api:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/scraper:/app
    command: python app.py

  # Python Engine Monitoring
  monitoring:
    build:
      context: ./backend/monitoring
      dockerfile: Dockerfile
    container_name: network_monitoring
    ports:
      - "5002:5002"
    environment:
      FLASK_ENV: development
      PORT: 5002
      API_URL: http://api:3000
    depends_on:
      - postgres
      - redis
    volumes:
      - ./backend/monitoring:/app
    command: python app.py

  # React Dashboard Frontend
  dashboard:
    build:
      context: ./frontend/dashboard
      dockerfile: Dockerfile
    container_name: network_dashboard
    ports:
      - "3001:3001"
    environment:
      REACT_APP_API_URL: http://localhost:3000
    depends_on:
      - api
    volumes:
      - ./frontend/dashboard:/app
      - /app/node_modules

volumes:
  postgres_data:
  redis_data:
